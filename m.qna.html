<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>EAST Investment | Mobile QnA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="m.styles.css" />
</head>
<body data-page="qna">
  <header class="m-header">
    <img class="m-logo" src="assets/logo-cutout.png" alt="EAST Investment Holdings Limited logo" />
        <div class="m-header-actions">
      <button class="lang-btn" data-target="zh">中</button>
      <button class="lang-btn" data-target="ko">한</button>
      <button class="lang-btn" data-target="en">EN</button>
    </div>
  </header>
  <main class="m-main">
    <section class="m-hero"><p class="m-eyebrow">QnA</p><h1 data-i18n="qna_title"></h1><p data-i18n="qna_sub"></p></section>
    <section class="m-card qna-panel">
      <label for="qna-role" data-i18n="qna_role_label"></label>
      <select id="qna-role" class="qna-input">
        <option value="lawyer" data-i18n="qna_role_lawyer"></option>
        <option value="accountant" data-i18n="qna_role_accountant"></option>
        <option value="adviser" data-i18n="qna_role_adviser"></option>
        <option value="planner" data-i18n="qna_role_planner"></option>
      </select>
      <p class="qna-label" data-i18n="qna_method_label"></p>
      <div class="qna-methods">
        <label><input type="radio" name="qna-method" value="phone" checked /> <span data-i18n="qna_method_phone"></span></label>
        <label><input type="radio" name="qna-method" value="email" /> <span data-i18n="qna_method_email"></span></label>
      </div>
      <button id="qna-go" class="action-btn" type="button" data-i18n="qna_go"></button>
      <p id="qna-status" class="qna-status" aria-live="polite"></p>
    </section>
  </main>
    <nav class="m-nav">
    <a data-nav="home" href="m.index.html"></a>
    <a data-nav="company" href="m.company.html"></a>
    <a data-nav="business" href="m.business.html"></a>
    <a data-nav="investment" href="m.investment.html"></a>
    <a data-nav="certification" href="m.certification.html"></a>
    <a data-nav="roadmap" href="m.roadmap.html"></a>
    <a data-nav="qna" href="m.qna.html"></a>
  </nav>
  <script src="script.js"></script>
</body>
</html>
